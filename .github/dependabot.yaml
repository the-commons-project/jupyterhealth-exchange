version: 2
updates:
  # Maintain dependencies in our GitHub Workflows
  - package-ecosystem: github-actions
    directory: /
    groups:
      # group actions PRs
      actions:
        patterns:
          - "actions/*"
      docker:
        patterns:
          - "docker/*"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: /
    groups:
      # one big pull request for patch bumps
      patch:
        patterns:
          - "*"
        update-types:
          - patch
    schedule:
      interval: monthly
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /test/frontend/
    groups:
      # one big pull request for minor/patch bumps in js
      minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    schedule:
      interval: monthly
    cooldown:
      default-days: 7

  # MCP server (uv project). Keeps the uv.lock current — notably omh-shim,
  # which adds OMH schemas frequently; the test_covers_jhe_seeded_codes drift
  # guard gates each bump in CI.
  - package-ecosystem: uv
    directory: /mcp_server
    groups:
      # one big pull request for minor/patch bumps
      minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
