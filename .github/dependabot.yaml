version: 2
updates:
  # Maintain dependencies in our GitHub Workflows
  - package-ecosystem: github-actions
    directory: /
    groups:
      # group actions PRs
      actions:
        patterns:
          - "actions/*"
      docker:
        patterns:
          - "docker/*"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: /
    groups:
      # one big pull request for patch bumps
      patch:
        patterns:
          - "*"
        update-types:
          - patch
    schedule:
      interval: monthly
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /core/static/common/js/test/
    groups:
      # one big pull request for minor/patch bumps in js
      minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
