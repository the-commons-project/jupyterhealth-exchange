name: MCP Server CI
run-name: MCP Server CI triggered by ${{ github.event_name }} to ${{ github.ref }}

on:
  push:
    paths:
      - 'mcp_server/**'
      - '.github/workflows/mcp_server_ci.yml'
  pull_request:
    paths:
      - 'mcp_server/**'
      - '.github/workflows/mcp_server_ci.yml'

permissions:
  contents: read

jobs:
  test:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp_server
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.8.4"

      - name: Sync dependencies from lockfile
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Run unit tests
        run: uv run pytest tests/unit -q

  build:
    name: Reproducible Docker build
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image (no push) with SBOM and provenance
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./mcp_server
          file: ./mcp_server/Dockerfile
          push: false
          tags: jhe-mcp:ci
          provenance: true
          sbom: true
