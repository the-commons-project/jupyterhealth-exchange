name: Build container image

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - README.md
      - docs/**
      - tests/backend/**
      - .pre-commit-config.yaml
      - .github/**
      - "!.github/workflows/image.yaml"
  pull_request:
    paths-ignore:
      - README.md
      - docs/**
      - tests/backend/**
      - .pre-commit-config.yaml
      - .github/**
      - "!.github/workflows/image.yaml"
  workflow_dispatch:

permissions:
  contents: read

env:
  # only publish from this repo, not forks
  PUBLISHING_REPO: jupyterhealth/jupyterhealth-exchange
  REGISTRY: ghcr.io

jobs:
  build-image:
    name: build ${{ matrix.image_name }}
    services:
      # So that we can test this in PRs/branches
      local-registry:
        image: registry:2
        ports:
          - 5000:5000

    strategy:
      matrix:
        include:
          - image_name: ${{ github.repository }}
            context: .
          - image_name: ${{ github.repository }}-mcp
            context: mcp_server

    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Should we push this image to a public registry?
        shell: python
        run: |
          import os
          repo = os.environ["GITHUB_REPOSITORY"]
          event = os.environ["GITHUB_EVENT_NAME"]
          ref = os.environ["GITHUB_REF"]
          if (
              repo == "${{ env.PUBLISHING_REPO }}"
              and event == "push"
              and (
                  ref.startswith("refs/tags/")
                  or ref == "refs/heads/main"
              )
          ):
              print(f"Publishing image to {os.environ['REGISTRY']}")
          else:
              # PR or fork, don't push
              print("Publishing image to local registry")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"REGISTRY=localhost:5000\n")

      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          # Allows pushing to registry on localhost:5000
          driver-opts: network=host

      # use hash pinning on actions that get access to secrets.GITHUB_TOKEN
      - name: Log in to the Container registry
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@3864d6aed8ff134b2ed894ce00c87695c709c870
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@020b7354dd55a28effcab0f3b19639fe24d3f58b
        with:
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
          images: ${{ env.REGISTRY }}/${{ matrix.image_name }}

      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          push: true
          platforms: linux/amd64,linux/aarch64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          context: ${{ matrix.context }}
