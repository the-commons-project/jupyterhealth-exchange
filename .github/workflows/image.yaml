name: Build container image

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - README.md
      - docs/**
      - tests/**
      - .pre-commit-config.yaml
      - .github/**
      - "!.github/workflows/image.yaml"
  pull_request:
    paths-ignore:
      - README.md
      - docs/**
      - tests/**
      - .pre-commit-config.yaml
      - .github/**
      - "!.github/workflows/image.yaml"
  workflow_dispatch:

permissions:
  contents: read

env:
  # only publish from this repo, not forks
  PUBLISHING_REPO: jupyterhealth/jupyterhealth-exchange
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-image:
    services:
      # So that we can test this in PRs/branches
      local-registry:
        image: registry:2
        ports:
          - 5000:5000

    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Should we push this image to a public registry?
        shell: python
        run: |
          import os
          repo = os.environ["GITHUB_REPOSITORY"]
          event = os.environ["GITHUB_EVENT_NAME"]
          ref = os.environ["GITHUB_REF"]
          if (
              repo == "${{ env.PUBLISHING_REPO }}"
              and event == "push"
              and (
                  ref.startswith("refs/tags/")
                  or ref == "refs/heads/main"
              )
          ):
              print(f"Publishing image to {os.environ['REGISTRY']}")
          else:
              # PR or fork, don't push
              print("Publishing image to local registry")
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"REGISTRY=localhost:5000\n")

      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          # Allows pushing to registry on localhost:5000
          driver-opts: network=host

      # use hash pinning on actions that get access to secrets.GITHUB_TOKEN
      - name: Log in to the Container registry
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@9f4a8ea54ed9055d5f86c993e1f2ffa674f98344
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # https://github.com/docker/metadata-action
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@4f5b5234679dfa19837d4942067c97d7df43b7b3
        with:
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # https://github.com/docker/build-push-action
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          push: true
          platforms: linux/amd64,linux/aarch64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
