name: Frontend Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: core/static/common/js/test/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
        working-directory: core/static/common/js/test

      - name: Run tests
        run: |
          npm test
        working-directory: core/static/common/js/test
