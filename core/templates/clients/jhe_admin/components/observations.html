{% verbatim %}
<script id="t-observations" type="text/template">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <table>
      <tr>
        <td class="pe-3">
          <select
            id="organizationForObservations"
            class="form-control form-select"
            onchange="nav('observations', null, {organizationId: this.value})"
          >
            {{#organizationForObservationsSelect}} {{#if selected}}
              <option value="{{id}}" selected>{{name}}</option>
            {{else}}
              <option value="{{id}}">{{name}}</option>
            {{/if}} {{/organizationForObservationsSelect}}
          </select>
        </td>
        <td class="pe-3">
          <select
            id="studyForObservations"
            class="form-control form-select"
            onchange="this.value == 'all' ? nav('observations',{ organizationId: {{organizationId}}, page: 1, studyId: null }) : nav('observations',{studyId: this.value, organizationId: {{organizationId}}, page: 1 })"
          >
              <option value="all">All Studies</option>
            {{#studyForObservationsSelect}} {{#if selected}}
              <option value="{{id}}" selected>{{name}}</option>
            {{else}}
              <option value="{{id}}">{{name}}</option>
            {{/if}} {{/studyForObservationsSelect}}
          </select>
        </td>
      </tr>
    </table>
    <div class="d-flex align-items-center flex-wrap gap-2">
      <span class="d-inline-flex align-items-center text-nowrap me-3">Page
        <input
          type="number"
          class="form-control form-control-sm d-inline-block mx-2"
          style="width: 60px;"
          value="{{page}}"
          min="1"
          max="{{totalPages}}"
          onchange="nav('observations', null, {...getCurrentRouteAndParams().params, page: this.value})"
          onkeydown="if(event.key === 'Enter') { event.preventDefault(); nav('observations', null, {...getCurrentRouteAndParams().params, page: this.value}) }"
        /> of {{totalPages}}
      </span>
      <span class="d-inline-flex align-items-center text-nowrap">
        <select
          class="form-select form-select-sm me-2"
          style="width: auto;"
          onchange="nav('observations', null, {...getCurrentRouteAndParams().params, pageSize: this.value, page: 1})"
        >
          {{#each pageSizes}}
            <option value="{{this}}" {{#if (eq ../pageSize this)}}selected{{/if}}>{{this}}</option>
          {{/each}}
        </select>
        per page
      </span>
    </div>
  </div>

  <table class="table table-striped">
    <thead>
      <tr>
        <th scope="col"></th>
        <th scope="col">ID</th>
        <th scope="col">Scope</th>
        <th scope="col">Patient</th>
        <th scope="col">User ID</th>
        <th scope="col">Transaction Time</th>
        <th scope="col">Data</th>
      </tr>
    </thead>
    <tbody>
      {{#observations}}
        <tr>
          <td>
          </td>
          <td>{{id}}</td>
          <td>{{codingText}}</td>
          <td>{{patientNameFamily}}, {{patientNameGiven}}</td>
          <td>{{jheUserId}}</td>
          <td>{{lastUpdated}}</td>
          <td><pre>{{omhData}}</pre></td>
        </tr>
      {{/observations}}
    </tbody>
  </table>
  <div class="form-text">
    <strong>ID</strong> is the JHE-generated Patient record id.
    <strong>User ID</strong> is the JHE-generated account id (jheUserId) for the patient's login.
    A patient's External ID, set by whoever created the patient, is shown on the Patient record.
  </div>
</script>
{% endverbatim %}
