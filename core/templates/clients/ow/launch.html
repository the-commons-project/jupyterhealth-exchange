{% extends "clients/ow/base.html" %} {% block title %}Launch{% endblock %}

{% block body_content %}

<div class="w-100 text-center mt-5">
  <h1>OW Client</h1>
  <pre id="out" class="text-start ms-5 me-5">
  </pre>
  <div id="consent_form" class="text-start ms-5 me-5 mt-4"></div>
</div>

{% endblock %}

{% block body_footer %}
<!-- put any constants etc directly into this file this is just a POC -->
<!-- put functions in core/static/clients/ow/js/client-ow.js and core/static/common/js/common.js as needed and keep formatting consistent -->
<script>
    var out = document.getElementById("out");
    var consentForm = document.getElementById("consent_form");

    async function run() {
        out.textContent = "Processing link...";

        // 1. Get the invite code (format: host_token) and redeem it for an OAuth grant.
        var params = new URLSearchParams(window.location.search);
        var code = params.get("code");
        if (!code) {
            out.textContent += "\nError: no code parameter in URL";
            return;
        }
        var link = parseInvitationCode(code);
        if (!link) {
            out.textContent += "\nError: invalid invitation code format";
            return;
        }
        out.textContent += "\nHost: " + link.host;
        out.textContent += "\nToken: " + link.token;

        out.textContent += "\n\nRedeeming invitation...";
        var invitationResponse = await fetch(window.location.protocol + "//" + link.host + "/api/v1/invitation/" + link.token, {
            method: "POST",
            headers: { "Cache-Control": "no-cache" },
        });
        if (!invitationResponse.ok) {
            out.textContent += "\nError: failed to redeem invitation (" + invitationResponse.status + ")";
            return;
        }
        var grant = await invitationResponse.json();
        var clientId = grant.grant.client_id;
        var authCode = grant.grant.code;
        var redirectUri = grant.grant.redirect_uri;
        // PKCE code verifier is derived from the invitation token (see server-side issuance).
        var codeVerifier = btoa(link.token).replace(/=/g, "");
        out.textContent += "\nClient ID: " + clientId;
        out.textContent += "\nRedirect URI: " + redirectUri;

        // 2. Swap auth code for access token
        out.textContent += "\n\nSwapping auth code for access token...";
        var tokens = await exchangeCodeForToken(clientId, authCode, codeVerifier, redirectUri);
        if (!tokens || !tokens.access_token) {
            out.textContent += "\nError: failed to exchange code for token";
            return;
        }
        out.textContent += "\nAccess token received";
        var accessToken = tokens.access_token;
        storeToken(accessToken);

        // 3. Fetch consents and let the patient choose what to share.
        // JHE study consents are the single source of truth for what
        // ow_poll will actually pull and store; the Oura OAuth scope
        // grant on the next step is just a capability ceiling.
        out.textContent += "\n\nLoading consents...";
        var profile = await getPatientProfile(accessToken);
        if (!profile || !profile.patient) {
            out.textContent += "\nError: failed to load patient profile";
            return;
        }
        var patientId = profile.patient.id;
        var consentsData = await getConsents(accessToken, patientId);
        if (!consentsData) {
            out.textContent += "\nError: failed to load consents";
            return;
        }
        out.textContent += "\nReview the data each study may collect, then click Save to continue.";

        renderConsentForm(consentForm, consentsData, async function (decisions) {
            consentForm.innerHTML = "";
            out.textContent += "\n\nSaving consents...";
            var createdOk = await submitConsents(accessToken, patientId, decisions.created, "POST");
            var updatedOk = await submitConsents(accessToken, patientId, decisions.updated, "PATCH");
            if (!createdOk || !updatedOk) {
                out.textContent += "\nError: failed to save consents";
                return;
            }
            out.textContent += "\nConsents saved";
            await continueOwFlow(accessToken);
        });
    }

    async function continueOwFlow(accessToken) {
        // 4-5. Create OW user via JHE proxy
        out.textContent += "\n\nCreating OW user...";
        var owUser = await createOwUser(accessToken);
        if (!owUser) {
            out.textContent += "\nError: failed to create OW user";
            return;
        }
        out.textContent += "\nOW user ID: " + owUser.ow_user_id;

        // 6-7. Get Oura auth URL via JHE proxy
        var owCompleteUri = window.location.origin + "/clients/ow/complete";
        out.textContent += "\n\nGetting Oura auth URL...";
        var ouraAuth = await getOuraAuthUrl(accessToken, owCompleteUri);
        if (!ouraAuth || !ouraAuth.authorizationUrl) {
            out.textContent += "\nError: failed to get Oura auth URL";
            return;
        }
        out.textContent += "\nOura auth URL: " + ouraAuth.authorizationUrl;

        // 8. Redirect to Oura auth URL
        out.textContent += "\n\nRedirecting to Oura...";
        window.location.href = ouraAuth.authorizationUrl;
    }

    run();
</script>
{% endblock %}
