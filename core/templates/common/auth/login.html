{% extends "common/partials/base_home.html" %} {% block title %}Auth Forwarding...{% endblock %}
{% block body_content %}
<div class="mt-5 w-100 text-center">
  <div id="authLoading">
    <h5 class="mb-3">Forwarding to log in... </h5>
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only"></span>
    </div>
  </div>
  <div id="authError" class="alert alert-danger d-inline-block text-start" role="alert" style="display: none;">
    <h5 class="mb-2">Sign-in failed</h5>
    <div id="authErrorMessage" class="mb-3"></div>
    <a href="{% url 'login' %}" class="btn btn-primary btn-sm" onclick="clearAuthError()">Back to Log In</a>
  </div>
</div>
{% endblock %}
{% block body_footer %}
<script>
  clearAuthError();
  userManager
    .signinRedirect()
    .then((user) => {
      console.log("userManager user",JSON.stringify(user, null, 2));
    })
    .catch((err) => {
      console.error(err);
      const message = describeOidcError(err);
      setAuthError(message);
      showAuthError(message);
    });
</script>
{% endblock %}
