# JupyterHealth Exchange — local development stack
#
# Default usage (JHE only):
#     docker compose up
#
# With the optional Open Wearables module:
#     docker compose --profile ow up
#
# Port and container name configuration:
#     Copy .env.example to .env and adjust ports to avoid collisions
#     when running multiple worktrees simultaneously.
#
# See docs/open-wearables-integration.md for setup details.

services:
  db:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_db
    environment:
      POSTGRES_DB: jhe
      POSTGRES_USER: jhe
      POSTGRES_PASSWORD: jhe
    ports:
      - "${JHE_DB_PORT:-5433}:5432"
    volumes:
      - jhe_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jhe -d jhe"]
      interval: 5s
      timeout: 5s
      retries: 5

  jhe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_app
    environment:
      DEBUG: "1"
      SECRET_KEY: "dev-secret-key-change-me"
      SITE_URL: "http://localhost:${JHE_APP_PORT:-8000}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,${COMPOSE_PROJECT_NAME:-jhe}_app,host.docker.internal"
      DB_NAME: jhe
      DB_USER: jhe
      DB_PASSWORD: jhe
      DB_HOST: db
      DB_PORT: "5432"
      OW_PIPELINE_MODE: "${OW_PIPELINE_MODE:-normalized}"
