  # ─────────────────────────────────────────────────────────────────
  # OW polling pipeline cron sidecar (profile: polling)
  # ─────────────────────────────────────────────────────────────────

  jhe_cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_cron
    profiles: ["polling"]
    environment:
      DEBUG: "1"
      SECRET_KEY: "dev-secret-key-change-me"
      SITE_URL: "http://localhost:${JHE_APP_PORT:-8000}"
      ALLOWED_HOSTS: "localhost,127.0.0.1,${COMPOSE_PROJECT_NAME:-jhe}_app,host.docker.internal"
      DB_NAME: jhe
      DB_USER: jhe
      DB_PASSWORD: jhe
      DB_HOST: db
      DB_PORT: "5432"
      OW_PIPELINE_MODE: "${OW_PIPELINE_MODE:-normalized}"
    depends_on:
      db:
        condition: service_healthy
    command: ["supercronic", "/code/deploy/crontab"]

  # ─────────────────────────────────────────────────────────────────
  # Optional Open Wearables module (profile: ow)
  # ─────────────────────────────────────────────────────────────────

  ow_db:
    image: postgres:18
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_db
    profiles: ["ow"]
    environment:
      POSTGRES_DB: open-wearables
      POSTGRES_USER: open-wearables
      POSTGRES_PASSWORD: open-wearables
    ports:
      - "${OW_DB_PORT:-5432}:5432"
    volumes:
      - jhe_ow_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open-wearables -d open-wearables"]
      interval: 5s
      timeout: 5s
      retries: 5

  ow_redis:
    image: redis:8
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_redis
    profiles: ["ow"]
    ports:
      - "${OW_REDIS_PORT:-6379}:6379"
    volumes:
      - jhe_ow_redisdata:/data

  ow_app:
    build:
      context: ${OW_BACKEND_PATH:-../../open-wearables/backend}
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_app
    profiles: ["ow"]
    image: ${COMPOSE_PROJECT_NAME:-jhe}-ow-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - ${OW_BACKEND_PATH:-../../open-wearables/backend}/config/.env
    environment:
      DB_HOST: ow_db
      REDIS_HOST: ow_redis
    ports:
      - "${OW_APP_PORT:-8001}:8000"
    depends_on:
      ow_db:
        condition: service_healthy
      ow_redis:
        condition: service_started
      ow_object_store_init:
        condition: service_completed_successfully

  ow_celery_worker:
    image: ${COMPOSE_PROJECT_NAME:-jhe}-ow-platform:latest
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_celery_worker
    profiles: ["ow"]
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - ${OW_BACKEND_PATH:-../../open-wearables/backend}/config/.env
    environment:
      DB_HOST: ow_db
      REDIS_HOST: ow_redis
    depends_on:
      ow_db:
        condition: service_healthy
      ow_redis:
        condition: service_started
      ow_app:
        condition: service_started
      ow_object_store_init:
        condition: service_completed_successfully

  ow_celery_beat:
    image: ${COMPOSE_PROJECT_NAME:-jhe}-ow-platform:latest
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_celery_beat
    profiles: ["ow"]
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - ${OW_BACKEND_PATH:-../../open-wearables/backend}/config/.env
    environment:
      DB_HOST: ow_db
      REDIS_HOST: ow_redis
    depends_on:
      ow_db:
        condition: service_healthy
      ow_redis:
        condition: service_started
      ow_app:
        condition: service_started

  ow_frontend:
    build:
      context: ${OW_FRONTEND_PATH:-../../open-wearables/frontend}
      dockerfile: Dockerfile.dev
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_frontend
    profiles: ["ow"]
    image: ${COMPOSE_PROJECT_NAME:-jhe}-ow-frontend:dev
    pull_policy: never
    environment:
      VITE_API_URL: "http://localhost:${OW_APP_PORT:-8001}"
    ports:
      - "${OW_FRONTEND_PORT:-3001}:3000"
    depends_on:
      - ow_app

  # ─────────────────────────────────────────────────────────────────
  # MinIO: S3-protocol object store for raw Oura payload storage.
  # Only used in the oura-raw worktree. Runs locally, no AWS needed.
  # Console:  http://localhost:${MINIO_CONSOLE_PORT:-9001}
  # API:      http://ow-object-store:9000  (inside Docker network)
  # ─────────────────────────────────────────────────────────────────

  ow_object_store:
    image: minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_object_store
    profiles: ["ow"]
    command: server /data --console-address ":9001"
    networks:
      default:
        aliases:
          - ow-object-store
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - jhe_ow_object_store_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ow_object_store_init:
    image: minio/mc:latest
    container_name: ${COMPOSE_PROJECT_NAME:-jhe}_ow_object_store_init
    profiles: ["ow"]
    depends_on:
      ow_object_store:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://ow-object-store:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/raw-payloads &&
      echo 'Bucket raw-payloads is ready.'
      "

volumes:
  jhe_pgdata:
  jhe_ow_pgdata:
  jhe_ow_redisdata:
  jhe_ow_object_store_data:
