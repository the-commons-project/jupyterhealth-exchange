info:
  name: Filtered Summary Observations
  type: http
  seq: 6

http:
  method: GET
  url: "{{BASE_URL}}/FHIR/R5/Observation?patient={{PATIENT_ID}}&patient._has:Group:member:_id={{STUDY_ID}}&date=ge2025-01-01&date=le2025-06-01&_summary=count"
  params:
    - name: patient
      value: "{{PATIENT_ID}}"
      type: query
    - name: patient._has:Group:member:_id
      value: "{{STUDY_ID}}"
      type: query
    - name: date
      value: ge2025-01-01
      type: query
    - name: date
      value: le2025-06-01
      type: query
    - name: code
      value: https://w3id.org/openmhealth|omh:blood-pressure:4.0
      type: query
      disabled: true
    - name: _summary
      value: count
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
