info:
  name: Create Observation
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/FHIR/R5/Observation"
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
        "resourceType": "Observation",
        "identifier": [
          {
            "system": "https://chcs.org",
            "value": "A1234X49"
          }
        ],
        "status": "final",
        "code": {
          "coding": [
            {
              "system": "https://w3id.org/openmhealth",
              "code": "omh:blood-glucose:4.0"
            }
          ]
        },
        "subject": {
          "reference": "Patient/{{PATIENT_ID}}"
        },
        "device": {
          "reference": "Device/{{DATA_SOURCE_ID}}"
        },
        "valueAttachment": {
          "contentType": "application/json",
          "data": ""
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
