info:
  name: Create Practitioner
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/practitioners"
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
          "user": {{USER_ID}}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
