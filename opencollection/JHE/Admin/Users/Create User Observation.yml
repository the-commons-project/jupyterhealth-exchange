info:
  name: Create User Observation
  type: http
  seq: 9

http:
  method: POST
  url: "{{BASE_URL}}/api/v1/users/10005/observations"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "coding_system": "https://w3id.org/openmhealth",
          "coding_code": "omh:blood-glucose:4.0",
          "client_id": "{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}{{$randomAlphaNumeric}}",
          "value_attachment_data": {
              "blood_glucose": {
                  "unit": "mg/dL",
                  "value": 95
              },
              "effective_time_frame": {
                  "time_interval": {
                      "start_date_time": "2013-02-05T07:25:00Z",
                      "end_date_time": "2013-06-05T07:25:00Z"
                  }
              },
              "specimen_source": "capillary blood",
              "temporal_relationship_to_meal": "fasting",
              "temporal_relationship_to_sleep": "on waking",
              "descriptive_statistic": "minimum"
          }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
