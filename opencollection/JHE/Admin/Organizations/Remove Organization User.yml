info:
  name: Remove Organization User
  type: http
  seq: 10

http:
  method: DELETE
  url: "{{BASE_URL}}/api/v1/organizations/{{ORG_ID}}/remove_user"
  headers:
  - name: Content-Type
    value: application/json
  body:
    type: json
    data: |-
      {
          "jhe_user_id": {{USER_ID}}
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
