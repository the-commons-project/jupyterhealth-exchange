info:
  name: Paginate Data Source
  type: http
  seq: 1

http:
  method: GET
  url: "{{BASE_URL}}/api/v1/data_sources"
  params:
  - name: page
    value: "1"
    type: query
  - name: pageSize
    value: "5"
    type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
