[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "jhe.test_settings"
addopts = "--cov=core --cov=jhe"
markers = [
    "smoke: live deployment smoke tests (require --smoke-url)",
]
filterwarnings = [
    # The naive default in 0001_initial (last_updated, default='2024-09-23') makes Django warn
    # when it builds the test DB column. It is a migration-only artifact, not app data; permanent
    # fix tracked as a follow-up (issue #560). Scoped to that exact message so real naive-datetime
    # warnings still surface.
    'ignore:DateTimeField Patient\.last_updated received a naive datetime:RuntimeWarning',
]

[tool.ruff]
line-length = 120
target-version = "py312"
exclude = [
    "core/data",
    "core/migrations",
]

[tool.ruff.lint]
select = [
    "E9", # syntax
    # too much lint
    # "DJ", # pyflakes-django
    "F", # pyflakes
    "I", # isort
    "UP", # pyupgrade
]

[tool.ruff.format]
exclude = [
    "migrations",
]
