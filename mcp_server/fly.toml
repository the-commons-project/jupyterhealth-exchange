app = "jhe-mcp"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_HTTP_PORT = "8401"

[http_service]
  internal_port = 8401
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
